services:
  - type: web
    name: lifecost
    env: node
    plan: free
    region: frankfurt
    buildCommand: npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        value: file:./data/lifecost.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
    disk:
      name: lifecost-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
